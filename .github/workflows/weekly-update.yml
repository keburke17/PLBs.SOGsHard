name: Weekly Stats Update

on:
  schedule:
    - cron: '0 8 * * 4'   # Thursday 8am UTC = Thursday 4am ET  (catches Wed night results early)
    - cron: '0 4 * * 5'   # Friday 4am UTC = Thursday 11pm ET   (backup run)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run weekly update
        run: python3 update.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summer_2026.json data/app_data.json
          git diff --staged --quiet || git commit -m "chore: weekly stats update $(date -u +%Y-%m-%d)"
          git push
